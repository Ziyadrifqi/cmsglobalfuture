version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: cms_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cms_db
    ports:
      - "5433:5432"
    volumes:
      - cms_pgdata:/var/lib/postgresql/data

volumes:
  cms_pgdata:
