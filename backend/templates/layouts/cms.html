{{define "layouts/cms.html"}}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ .title }} — Yayasan CMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col fixed h-full">
    <div class="px-5 py-4 border-b border-gray-100">
      <span class="font-bold text-gray-800">Yayasan CMS</span>
    </div>
    <nav class="flex-1 py-3 overflow-y-auto">
      {{ template "sidebar_nav" . }}
    </nav>
    <div class="border-t border-gray-100 p-4">
      <div class="text-xs font-medium text-gray-700 truncate">{{ .session_user_name }}</div>
      <div class="text-xs text-blue-600 mb-3">{{ .session_user_role_display }}</div>
      <form method="POST" action="/cms/logout">
        <button class="text-xs text-red-500 hover:text-red-700">Keluar</button>
      </form>
    </div>
  </aside>

  <!-- Konten -->
  <main class="flex-1 ml-56 min-h-screen">
    {{ template "content" . }}
  </main>

</div>
</body>
</html>
{{end}}
