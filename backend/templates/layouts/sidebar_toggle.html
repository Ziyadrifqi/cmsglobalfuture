{{define "sidebar_toggle"}}
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<script>
(function () {
  /* ── Hamburger / sidebar mobile ─────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function () {
    var sidebar  = document.querySelector('.sidebar');
    var overlay  = document.getElementById('sidebarOverlay');
    var btns     = document.querySelectorAll('.hamburger-btn');

    function openSidebar()  { sidebar && sidebar.classList.add('open');  overlay && overlay.classList.add('open'); }
    function closeSidebar() { sidebar && sidebar.classList.remove('open'); overlay && overlay.classList.remove('open'); }

    btns.forEach(function (btn) { btn.addEventListener('click', openSidebar); });
    overlay && overlay.addEventListener('click', closeSidebar);
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSidebar(); });

    /* ── Flash alert — universal auto-hide & klik-untuk-tutup ─────────── */
    //
    // Script ini berjalan di SEMUA halaman CMS karena sidebar_toggle
    // di-include di setiap template. Tidak perlu lagi menambahkan
    // script flash per-halaman.
    //
    // Durasi default: 3500 ms (sukses) / 6000 ms (error/warning)
    // Override per-elemen: tambahkan data-autohide="5000" di div.flash
    //
    document.querySelectorAll('.flash').forEach(function (el) {
      // Tentukan durasi berdasarkan tipe atau atribut data-autohide
      var custom = parseInt(el.getAttribute('data-autohide') || '0', 10);
      var isError = el.classList.contains('flash-error') ||
                    el.classList.contains('flash-warning');
      var delay = custom || (isError ? 6000 : 3500);

      // Klik untuk tutup manual
      el.addEventListener('click', function () {
        el.classList.add('flash-hide');
      });

      // Auto-hide setelah delay
      setTimeout(function () {
        el.classList.add('flash-hide');
      }, delay);
    });
  });
})();
</script>
{{end}}
