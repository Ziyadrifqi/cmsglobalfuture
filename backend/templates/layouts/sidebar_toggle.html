{{define "sidebar_toggle"}}
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var sidebar = document.querySelector(".sidebar");
    var overlay = document.getElementById("sidebarOverlay");
    if (!sidebar || !overlay) return;

    function openSidebar() {
      sidebar.classList.add("open");
      overlay.classList.add("open");
    }
    function closeSidebar() {
      sidebar.classList.remove("open");
      overlay.classList.remove("open");
    }

    document.querySelectorAll(".hamburger-btn").forEach(function (btn) {
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        if (sidebar.classList.contains("open")) closeSidebar();
        else openSidebar();
      });
    });

    overlay.addEventListener("click", closeSidebar);

    // Tutup sidebar otomatis kalau user klik link/menu di dalamnya (mobile)
    sidebar.querySelectorAll("a, button").forEach(function (el) {
      el.addEventListener("click", function () {
        if (window.innerWidth <= 900) closeSidebar();
      });
    });

    // Reset state kalau resize ke layar besar (hindari sidebar "open" nyangkut)
    window.addEventListener("resize", function () {
      if (window.innerWidth > 900) closeSidebar();
    });
  });
</script>
{{end}}
